<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MonitorHub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 24px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 20px;
      color: #93c5fd;
      letter-spacing: 0.04em;
    }

    #status {
      display: inline-block;
      margin-bottom: 20px;
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      background: #1e293b;
      color: #94a3b8;
    }
    #status.connected    { background: #14532d; color: #86efac; }
    #status.disconnected { background: #450a0a; color: #fca5a5; }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 16px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .device-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .hostname {
      font-size: 0.92rem;
      font-weight: 600;
      color: #e2e8f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .device-id {
      font-size: 0.78rem;
      font-family: monospace;
      color: #7dd3fc;
      word-break: break-all;
    }

    .timestamp {
      font-size: 0.7rem;
      color: #64748b;
      white-space: nowrap;
      margin-left: 8px;
    }

    .metric-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.82rem;
    }

    .metric-label { color: #94a3b8; }
    .metric-value { font-weight: 600; color: #e2e8f0; }

    .bar-wrap {
      width: 100%;
      height: 6px;
      background: #334155;
      border-radius: 3px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .bar-cpu  { background: #38bdf8; }
    .bar-mem  { background: #a78bfa; }

    .cores {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .core-bar-wrap {
      flex: 1;
      min-width: 24px;
      height: 40px;
      background: #0f172a;
      border-radius: 3px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }
    .core-bar-fill {
      width: 100%;
      background: #38bdf8;
      transition: height 0.4s ease;
    }

    .divider {
      border: none;
      border-top: 1px solid #334155;
      margin: 10px 0;
    }

    .net-disk {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
      font-size: 0.78rem;
    }
    .nd-label { color: #94a3b8; }
    .nd-value { color: #e2e8f0; font-weight: 600; text-align: right; }
  </style>
</head>
<body>
  <h1>MonitorHub</h1>
  <div id="status">Connecting…</div>
  <div id="grid"></div>

  <script>
    const grid = document.getElementById('grid');
    const statusEl = document.getElementById('status');
    const cards = {};

    function fmt(bytes) {
      if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + ' GB';
      if (bytes >= 1048576)    return (bytes / 1048576).toFixed(1) + ' MB';
      if (bytes >= 1024)       return (bytes / 1024).toFixed(1) + ' KB';
      return bytes + ' B';
    }

    function fmtRate(bytes) { return fmt(bytes) + '/s'; }

    function shortId(id) {
      return id.length > 16 ? id.slice(0, 8) + '…' + id.slice(-8) : id;
    }

    function renderCard(m) {
      const cpuPct  = Math.min(m.cpu_usage, 100).toFixed(1);
      const memPct  = m.total_memory > 0
        ? ((m.used_memory / m.total_memory) * 100).toFixed(1)
        : 0;

      const coreHTML = (m.core_cpu_usage || []).map(v => {
        const h = Math.min(v, 100).toFixed(0);
        return `<div class="core-bar-wrap" title="${v.toFixed(1)}%">
          <div class="core-bar-fill" style="height:${h}%"></div>
        </div>`;
      }).join('');

      const ts = m.timestamp
        ? new Date(m.timestamp).toLocaleTimeString()
        : '';

      return `
        <div class="card-header">
          <div class="device-meta">
            <span class="hostname" title="${m.hostname || ''}">${m.hostname || 'Unknown host'}</span>
            <span class="device-id" title="${m.device_id}">${shortId(m.device_id)}</span>
          </div>
          <span class="timestamp">${ts}</span>
        </div>

        <div class="metric-row">
          <span class="metric-label">CPU</span>
          <span class="metric-value">${cpuPct}%</span>
        </div>
        <div class="bar-wrap"><div class="bar-fill bar-cpu" style="width:${cpuPct}%"></div></div>

        <div class="cores">${coreHTML}</div>

        <div class="metric-row">
          <span class="metric-label">Memory</span>
          <span class="metric-value">${fmt(m.used_memory)} / ${fmt(m.total_memory)} (${memPct}%)</span>
        </div>
        <div class="bar-wrap"><div class="bar-fill bar-mem" style="width:${memPct}%"></div></div>

        <hr class="divider" />

        <div class="net-disk">
          <span class="nd-label">Disk read</span>  <span class="nd-value">${fmtRate(m.disk_read)}</span>
          <span class="nd-label">Disk write</span> <span class="nd-value">${fmtRate(m.disk_write)}</span>
          <span class="nd-label">Net RX</span>     <span class="nd-value">${fmtRate(m.net_rx)}</span>
          <span class="nd-label">Net TX</span>     <span class="nd-value">${fmtRate(m.net_tx)}</span>
        </div>
      `;
    }

    function upsertDevice(m) {
      let card = cards[m.device_id];
      if (!card) {
        card = document.createElement('div');
        card.className = 'card';
        grid.appendChild(card);
        cards[m.device_id] = card;
      }
      card.innerHTML = renderCard(m);
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/ws`);

      ws.onopen = () => {
        statusEl.textContent = 'Connected';
        statusEl.className = 'connected';
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected — reconnecting…';
        statusEl.className = 'disconnected';
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();

      ws.onmessage = (event) => {
        let msg;
        try { msg = JSON.parse(event.data); } catch { return; }

        if (msg.type === 'snapshot') {
          (msg.devices || []).forEach(upsertDevice);
        } else if (msg.type === 'update' && msg.device) {
          upsertDevice(msg.device);
        }
      };
    }

    connect();
  </script>
</body>
</html>
